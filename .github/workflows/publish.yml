name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for `mcp-publisher login github-oidc`
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            echo "Fix: update package.json version to $TAG_VERSION, commit, delete the tag, re-tag, and push."
            exit 1
          fi
          echo "Version verified: v$PKG_VERSION"

      - name: Verify mcp-registry.json version matches package.json
        run: node scripts/check-mcp-registry-version.js

      - name: Verify CHANGELOG has section for this version
        run: node scripts/check-changelog.js

      - run: npm install
      # Skip npm publish if this exact version is already on the registry.
      # v1.3.12 hit this: MCP Registry step failed AFTER npm publish succeeded,
      # so the v1.3.12 npm package was live but the workflow as a whole failed.
      # Re-pushing the tag (to retry MCP Registry) would 403 here without the skip.
      - name: npm publish (idempotent)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "feishu-user-plugin@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "feishu-user-plugin@$PKG_VERSION already on npm — skipping publish"
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # MCP Registry publish — auto-syncs https://registry.modelcontextprotocol.io
      # after npm. Install command pulled verbatim from the official guide:
      # https://github.com/modelcontextprotocol/registry/blob/main/docs/modelcontextprotocol-io/github-actions.mdx
      # (curl-based — Homebrew is not available on ubuntu-latest by default).
      # Verify locally with:  curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher && ./mcp-publisher --help
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help

      - name: Authenticate to MCP Registry (github-oidc)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish mcp-registry.json

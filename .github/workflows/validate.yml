name: validate
on:
  pull_request:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: '20' }
      - run: npm ci
      - name: gitleaks (full history scan)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --config .gitleaks.toml --no-banner --redact --exit-code 1
      - run: node scripts/check-version.js
      - run: node scripts/check-description-drift.js
      - run: node scripts/check-mcp-registry-version.js
      - run: node scripts/check-mcpb-version.js
      - run: node scripts/check-tool-count.js
      - run: node scripts/check-scopes.js
      - run: node scripts/sync-server-json.js check
      - run: node scripts/check-changelog.js
      - name: AGENTS.md is in sync with CLAUDE.md
        run: |
          tail -n +2 CLAUDE.md > /tmp/body.md
          { echo "# feishu-user-plugin — Codex 指令"; cat /tmp/body.md; } > /tmp/expected_AGENTS.md
          diff /tmp/expected_AGENTS.md AGENTS.md
      - run: npm run smoke
      # v1.3.13: fixture-based unit tests now run in CI (Reviewer D P2).
      # test-all.js's `main()` exits early when LARK_COOKIE is absent (CI
      # has no creds); the bottom `.finally()` requires the 14 fixture
      # unit tests regardless, so they always run.
      - run: npm test

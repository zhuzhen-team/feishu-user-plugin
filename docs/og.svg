<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1734" height="907" viewBox="0 0 1734 907" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
  <!-- Background: dark navy with subtle radial accent -->
  <defs>
    <radialGradient id="bg-accent" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#1a3554" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0a1828" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="feishu-logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5e83ff"/>
      <stop offset="100%" stop-color="#7c5dff"/>
    </linearGradient>
    <radialGradient id="logo-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#7c5dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1734" height="907" fill="#0a1828"/>
  <rect width="1734" height="907" fill="url(#bg-accent)"/>

  <!-- Top header: project handle (mono) -->
  <text x="115" y="138" font-family="SF Mono, JetBrains Mono, Menlo, Consolas, monospace" font-size="40" fill="#7c8590" font-weight="500" letter-spacing="0.3">feishu-user-plugin</text>

  <!-- Vertical accent bar left of hero -->
  <rect x="115" y="200" width="6" height="370" rx="3" fill="#5e83ff" opacity="0.85"/>

  <!-- Hero title: 飞书 MCP 服务器 -->
  <text x="160" y="320" font-size="128" fill="#ffffff" font-weight="700" letter-spacing="-1">飞书 MCP 服务器</text>

  <!-- Three pills below hero -->
  <!-- Pill 1: 84 工具 (blue accent) -->
  <g transform="translate(160, 410)">
    <rect width="170" height="64" rx="32" fill="#0a1828" stroke="#4a88e8" stroke-width="1.8"/>
    <text x="85" y="42" font-size="30" fill="#ffffff" font-weight="600" text-anchor="middle">
      <tspan fill="#4a88e8" font-weight="700">84</tspan>
      <tspan dx="6">工具</tspan>
    </text>
  </g>

  <!-- Pill 2: 3 层鉴权 (purple accent) -->
  <g transform="translate(350, 410)">
    <rect width="186" height="64" rx="32" fill="#0a1828" stroke="#9966ff" stroke-width="1.8"/>
    <text x="93" y="42" font-size="30" fill="#ffffff" font-weight="600" text-anchor="middle">
      <tspan fill="#9966ff" font-weight="700">3</tspan>
      <tspan dx="6">层鉴权</tspan>
    </text>
  </g>

  <!-- Pill 3: 以你身份发消息 (cyan accent + paper-plane icon) -->
  <g transform="translate(556, 410)">
    <rect width="320" height="64" rx="32" fill="#0a1828" stroke="#3dd9d6" stroke-width="1.8"/>
    <!-- Paper-plane icon -->
    <g transform="translate(28, 24) scale(0.95)" stroke="#3dd9d6" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9l16-7-7 16-3-7-6-2z"/>
    </g>
    <text x="180" y="42" font-size="30" fill="#ffffff" font-weight="600" text-anchor="middle">以你身份发消息</text>
  </g>

  <!-- Compatibility row -->
  <text x="160" y="640" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="38" fill="#a8b3c0" font-weight="500" letter-spacing="0.2">
    <tspan fill="#ffffff" font-weight="600">Claude Code</tspan>
    <tspan fill="#5a6675" dx="22">·</tspan>
    <tspan dx="22">Codex</tspan>
    <tspan fill="#5a6675" dx="22">·</tspan>
    <tspan dx="22">OpenClaw</tspan>
    <tspan fill="#5a6675" dx="22">·</tspan>
    <tspan dx="22">Cursor</tspan>
    <tspan fill="#5a6675" dx="22">·</tspan>
    <tspan dx="22">Windsurf</tspan>
  </text>

  <!-- Right-side: simplified Feishu app icon (rounded square with gradient + abstract chat-glyph) -->
  <g transform="translate(1410, 220)">
    <!-- Glow halo -->
    <ellipse cx="115" cy="120" rx="220" ry="200" fill="url(#logo-glow)"/>
    <!-- App icon body -->
    <rect x="0" y="0" width="230" height="230" rx="56" fill="url(#feishu-logo)"/>
    <!-- Stylised glyph: simplified chat-bubble + speak swoosh (NOT the official Feishu mark) -->
    <g fill="#ffffff" opacity="0.96">
      <path d="M55 75 Q55 60 70 60 L155 60 Q170 60 170 75 L170 130 Q170 145 155 145 L100 145 L75 168 L75 145 Q55 145 55 130 Z"/>
      <path d="M105 88 L155 88" stroke="#5e83ff" stroke-width="6" stroke-linecap="round"/>
      <path d="M105 110 L140 110" stroke="#5e83ff" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Footer row: GitHub URL + npm command + MIT -->
  <g transform="translate(115, 815)" font-family="SF Mono, JetBrains Mono, Menlo, Consolas, monospace" font-size="26" fill="#7c8590" font-weight="500">
    <!-- GitHub icon -->
    <g transform="translate(0, -18)" fill="#a8b3c0">
      <path d="M16 0C7.16 0 0 7.16 0 16c0 7.06 4.58 13.06 10.94 15.18.8.14 1.1-.34 1.1-.76v-2.7c-4.46.96-5.4-2.16-5.4-2.16-.74-1.86-1.78-2.36-1.78-2.36-1.46-1 .1-.98.1-.98 1.6.12 2.46 1.66 2.46 1.66 1.44 2.46 3.78 1.74 4.7 1.34.14-1.04.56-1.74 1.02-2.14-3.56-.4-7.3-1.78-7.3-7.94 0-1.76.62-3.18 1.66-4.3-.16-.4-.72-2.04.16-4.26 0 0 1.34-.42 4.4 1.64 1.28-.36 2.66-.54 4.02-.54 1.36 0 2.74.18 4.02.54 3.06-2.06 4.4-1.64 4.4-1.64.88 2.22.32 3.86.16 4.26 1.04 1.12 1.66 2.54 1.66 4.3 0 6.18-3.74 7.54-7.32 7.94.58.5 1.08 1.46 1.08 2.94v4.36c0 .42.3.92 1.1.76C27.42 29.06 32 23.06 32 16 32 7.16 24.84 0 16 0z"/>
    </g>
    <text x="44" y="0" fill="#a8b3c0">github.com/EthanQC/feishu-user-plugin</text>

    <!-- Separator -->
    <text x="640" y="0" fill="#3d4a5c">·</text>

    <!-- npm icon -->
    <g transform="translate(680, -22)">
      <rect width="32" height="32" rx="4" fill="#cb3837"/>
      <path d="M7 8h18v18h-4V12h-4v14h-4V12h-4v14H7z" fill="#ffffff"/>
    </g>
    <text x="724" y="0" fill="#a8b3c0">npm i feishu-user-plugin</text>

    <!-- Separator -->
    <text x="1108" y="0" fill="#3d4a5c">·</text>

    <!-- MIT badge -->
    <g transform="translate(1148, -22)">
      <rect width="60" height="32" rx="4" fill="#1f2933"/>
      <text x="30" y="22" font-size="20" fill="#a8b3c0" font-weight="600" text-anchor="middle">MIT</text>
    </g>
  </g>
</svg>

  <!-- Compatibility row (medium, light gray) -->
  <text x="80" y="510" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" fill="#c9d1d9" font-weight="500">Claude Code  ·  Codex  ·  Cursor  ·  Windsurf</text>

  <!-- Bottom URL (small mono) -->
  <text x="80" y="575" font-family="SF Mono, Menlo, Consolas, monospace" font-size="22" fill="#6e7681">github.com/EthanQC/feishu-user-plugin  ·  npm i feishu-user-plugin  ·  MIT</text>

  <!-- Right-side decorative element: vertical accent bar -->
  <rect x="1150" y="80" width="6" height="470" fill="#ff8c00" opacity="0.6"/>
</svg>

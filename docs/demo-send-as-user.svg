<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="540" viewBox="0 0 1100 540">
  <!-- Drop shadow -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (page) -->
  <rect width="1100" height="540" fill="#f0f2f5"/>

  <!-- Terminal window chrome -->
  <g filter="url(#shadow)">
    <rect x="40" y="40" width="1020" height="460" rx="12" ry="12" fill="#1e1e1e"/>

    <!-- Title bar -->
    <rect x="40" y="40" width="1020" height="42" rx="12" ry="12" fill="#2d2d2d"/>
    <rect x="40" y="70" width="1020" height="12" fill="#2d2d2d"/>

    <!-- Traffic-light buttons -->
    <circle cx="68" cy="61" r="7" fill="#ff5f57"/>
    <circle cx="92" cy="61" r="7" fill="#ffbd2e"/>
    <circle cx="116" cy="61" r="7" fill="#28ca42"/>

    <!-- Window title (centered) -->
    <text x="550" y="66" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">claude — feishu-user-plugin</text>
  </g>

  <!-- Terminal content -->
  <g font-family="SF Mono, Menlo, Consolas, monospace" font-size="18">
    <!-- Line 1: prompt + user input -->
    <text x="70" y="135" fill="#5dd97a">❯</text>
    <text x="100" y="135" fill="#e6e6e6" font-family="PingFang SC, Hiragino Sans GB, sans-serif">帮我以我身份给王小明发：今天的代码 review 我看完了，有 3 个 nit</text>

    <!-- Spacer -->

    <!-- Line 2: Claude prefix -->
    <text x="70" y="195" fill="#ff8c00" font-weight="600">⌘</text>
    <text x="100" y="195" fill="#a8c6ff" font-weight="600">Claude</text>
    <text x="170" y="195" fill="#888" font-family="PingFang SC, Hiragino Sans GB, sans-serif">我会调用 send_to_user 工具：</text>

    <!-- Line 3: Tool call -->
    <text x="100" y="240" fill="#888">▸</text>
    <text x="125" y="240" fill="#5dd97a">send_to_user</text>
    <text x="270" y="240" fill="#ccc">(</text>
    <text x="282" y="240" fill="#a8c6ff">name</text>
    <text x="335" y="240" fill="#ccc">:</text>
    <text x="350" y="240" fill="#ffd866">"王小明"</text>
    <text x="440" y="240" fill="#ccc">,</text>

    <!-- Line 4: Tool call args continued -->
    <text x="125" y="270" fill="#a8c6ff">  text</text>
    <text x="190" y="270" fill="#ccc">:</text>
    <text x="205" y="270" fill="#ffd866" font-family="PingFang SC, Hiragino Sans GB, sans-serif">"今天的代码 review 我看完了，有 3 个 nit"</text>

    <!-- Line 5: closing paren -->
    <text x="125" y="300" fill="#ccc">)</text>

    <!-- Tool result -->
    <text x="100" y="345" fill="#5dd97a">✓</text>
    <text x="125" y="345" fill="#888">Sent</text>
    <text x="180" y="345" fill="#ccc">→</text>
    <text x="205" y="345" fill="#888">msg_id:</text>
    <text x="285" y="345" fill="#ffd866">"om_a1b2c3d4..."</text>

    <!-- Final assistant reply -->
    <text x="70" y="395" fill="#ff8c00" font-weight="600">⌘</text>
    <text x="100" y="395" fill="#a8c6ff" font-weight="600">Claude</text>
    <text x="170" y="395" fill="#e6e6e6" font-family="PingFang SC, Hiragino Sans GB, sans-serif">已发送 ✓ 王小明 收到的是你本人头像 + 名字。</text>

    <!-- Cursor / next prompt -->
    <text x="70" y="445" fill="#5dd97a">❯</text>
    <rect x="100" y="432" width="12" height="20" fill="#5dd97a"/>
  </g>

  <!-- Footer caption -->
  <text x="550" y="520" font-family="SF Pro Display, -apple-system, sans-serif" font-size="14" fill="#666" text-anchor="middle">以你本人身份发飞书消息 · 不是机器人 · feishu-user-plugin</text>
</svg>
